        name: site_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$23 (billed yearly)'
        userMultiplied: false
      - label: API Rate Limit
        name: api_rate_limit
        type: tiered
        metric: requests_per_minute
        limit: 120
        timeFrame: minute
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
