    post:
      x-fern-sdk-group-name: collections
      x-fern-sdk-method-name: create
      security:
        - OAuth2:
            - cms:write
      operationId: create-collection
      summary: Webflow Create Collection
      description: 'Create a Collection for a site with collection fields.


        Each collection includes the required _name_ and _slug_ fields, which are generated automatically. You can update the `displayName` of these fields, but the slug for them cannot be changed. Fields slugs are automatically converted to lowercase. Spaces in slugs are replaced with hyphens.


        Required scope | `cms:write`

        '
      tags:
        - Collections
        - Sites
      parameters:
        - name: site_id
          in: path
          description: Unique identifier for a Site
          example: 580e63e98c9a982ac9b8b741
          required: true
          schema:
            type: string
            format: objectid
            default:
      requestBody:
        description: Pass the Name of the collection, as well as the singular name of each item in the collection.
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - displayName
                - singularName
              properties:
                displayName:
                  type: string
                  description: Name of the collection. Each collection name must be distinct.
                singularName:
                  type: string
                  description: Singular name of each item.
                slug:
                  type: string
                  description: Part of a URL that identifier
                fields:
                  type: array
                  description: An array of custom fields to add to the collection
                  items:
                    description: Details about the field of a collection
                    examples:
                      StaticField:
                        id: 562ac0395358780a1f5e6fbc
                        isEditable: true
                        type: RichText
                        isRequired: false
                        displayName: Post Body
                        helpText: Add the body of your post here
                      OptionField:
                        id: 562ac0395358780a1f5e6fbc
                        isEditable: true
                        type: Option
                        isRequired: false
                        displayName: Post Type
                        helpText: Add the body of your post here
                        metadata:
                          options:
                            - name: Feature
                            - name: News
                            - name: Product Highlight
                      ReferenceField:
                        id: 562ac0395358780a1f5e6fbd
                        isEditable: true
                        type: Reference
                        isRequired: false
                        displayName: Author
                        helpText: Add the post author here
                        metadata:
                          collectionId: 63692ab61fb2852f582ba8f5
                    oneOf:
                      - type: object
                        x-fern-type-name: Static Field
                        title: Static Field
                        required:
                          - type
                          - displayName
                        properties:
                          id:
                            type: string
                            format: objectid
                            description: Unique identifier for a Field
                            example: 562ac0395358780a1f5e6fbd
                            readOnly: true
                          isEditable:
                            type: boolean
                            description: Define whether the field is editable
                            readOnly: true
                            example: true
                          isRequired:
                            type: boolean
                            description: define whether a field is required in a collection
                          type:
                            type: string
                            enum:
                              - Color
                              - DateTime
                              - Email
                              - File
                              - Image
                              - Link
                              - MultiImage
                              - Number
                              - Phone
                              - PlainText
                              - RichText
                              - Switch
                              - VideoLink
                            description: Choose these appropriate field type for your collection data
                          displayName:
                            type: string
                            description: The name of a field
                          helpText:
                            type: string
                            description: Additional text to help anyone filling out this field
                        example:
                          id: 562ac0395358780a1f5e6fbc
                          isEditable: true
                          type: RichText
                          isRequired: false
                          displayName: Post Body
                          helpText: Add the body of your post here
                      - type: object
                        x-fern-type-name: Option Field
                        title: Option Field
                        required:
                          - type
                          - displayName
                          - metadata
                        properties:
                          id:
                            type: string
                            format: objectid
                            description: Unique identifier for a Field
                            readOnly: true
                          isEditable:
                            type: boolean
                            description: Define whether the field is editable
                            readOnly: true
                          isRequired:
                            type: boolean
                            description: define whether a field is required in a collection
                          type:
                            description: The [Option field type](/data/reference/field-types-item-values#option)
                            type: string
                            enum:
                              - Option
                          displayName:
                            type: string
                            description: The name of a field
                          helpText:
                            type: string
                            description: Additional text to help anyone filling out this field
                          metadata:
                            type: object
                            required:
                              - options
                            description: The metadata for the Option field.
                            properties:
                              options:
                                type: array
                                description: The option values for the Option field.
                                items:
                                  type: object
                                  required:
                                    - name
                                  description: A single option value for the Option field.
                                  properties:
                                    name:
                                      type: string
                                      description: The name of the option
                                    id:
                                      type: string
                                      description: The unique identifier of the option
                                      readOnly: true
                                  minItems: 1
                                  maxItems: 100
                        example:
                          id: 562ac0395358780a1f5e6fbc
                          isEditable: true
                          type: Option
                          isRequired: false
                          displayName: Post Type
                          helpText: Add the body of your post here
                          metadata:
                            options:
                              - name: Feature
                              - name: News
                              - name: Product Highlight
                      - type: object
                        x-fern-type-name: Reference Field
                        title: Reference Field
                        required:
                          - type
                          - displayName
                          - metadata
                        properties:
                          id:
                            type: string
                            format: objectid
                            description: Unique identifier for a Field
                            readOnly: true
                          isEditable:
                            type: boolean
                            description: Define whether the field is editable
                            readOnly: true
                          isRequired:
                            type: boolean
                            description: define whether a field is required in a collection
                          type:
                            type: string
                            enum:
                              - MultiReference
                              - Reference
                            description: Choose these appropriate field type for your collection data
                          displayName:
                            type: string
                            description: The name of a field
                          helpText:
                            type: string
                            description: Additional text to help anyone filling out this field
                          metadata:
                            type: object
                            required:
                              - collectionId
                            properties:
                              collectionId:
                                type: string
                                description: The unique identifier of the collection
                            description: The collectionId for the referenced collection. Only applicable for Reference and MultiReference fields.
                        example:
                          id: 562ac0395358780a1f5e6fbd
                          isEditable: true
                          type: Reference
                          isRequired: false
                          displayName: Author
                          helpText: Add the post author here
                          metadata:
                            collectionId: 63692ab61fb2852f582ba8f5
            example:
              displayName: Blog Posts
              singularName: Blog Post
              slug: posts
              fields:
                - type: PlainText
                  displayName: Title
                  slug: title
                  isRequired: true
                  helpText: The title of the blog post
                - type: RichText
                  displayName: Content
                  slug: content
                  isRequired: true
                  helpText: The content of the blog post
