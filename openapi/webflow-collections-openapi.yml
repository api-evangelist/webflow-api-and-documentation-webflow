    post:
      x-fern-sdk-group-name:
        - collections
        - fields
      x-fern-sdk-method-name: create
      security:
        - OAuth2:
            - cms:write
      operationId: create-field
      summary: Webflow Create Collection Field
      description: 'Create a custom field in a collection.


        Field validation is currently not available through the API.


        Bulk creation of fields is not supported with this endpoint. To add multiple fields at once, include them when you [create the collection.](/data/v2.0.0/reference/cms/collections/create)


        Required scope | `cms:write`

        '
      tags:
        - Collections
        - Sites
      requestBody:
        description: The field to create
        required: true
        content:
          application/json:
            schema:
              description: Details about the field of a collection
              examples:
                StaticField:
                  id: 562ac0395358780a1f5e6fbc
                  isEditable: true
                  type: RichText
                  isRequired: false
                  displayName: Post Body
                  helpText: Add the body of your post here
                OptionField:
                  id: 562ac0395358780a1f5e6fbc
                  isEditable: true
                  type: Option
                  isRequired: false
                  displayName: Post Type
                  helpText: Add the body of your post here
                  metadata:
                    options:
                      - name: Feature
                      - name: News
                      - name: Product Highlight
                ReferenceField:
                  id: 562ac0395358780a1f5e6fbd
                  isEditable: true
                  type: Reference
                  isRequired: false
                  displayName: Author
                  helpText: Add the post author here
                  metadata:
                    collectionId: 63692ab61fb2852f582ba8f5
              oneOf:
                - type: object
                  x-fern-type-name: Static Field
                  title: Static Field
                  required:
                    - type
                    - displayName
                  properties:
                    id:
                      type: string
                      format: objectid
                      description: Unique identifier for a Field
                      example: 562ac0395358780a1f5e6fbd
                      readOnly: true
                    isEditable:
                      type: boolean
                      description: Define whether the field is editable
                      readOnly: true
                      example: true
                    isRequired:
                      type: boolean
                      description: define whether a field is required in a collection
                    type:
                      type: string
                      enum:
                        - Color
                        - DateTime
                        - Email
                        - File
                        - Image
                        - Link
                        - MultiImage
                        - Number
                        - Phone
                        - PlainText
                        - RichText
                        - Switch
                        - VideoLink
                      description: Choose these appropriate field type for your collection data
                    displayName:
                      type: string
                      description: The name of a field
                    helpText:
                      type: string
                      description: Additional text to help anyone filling out this field
                  example:
                    id: 562ac0395358780a1f5e6fbc
                    isEditable: true
                    type: RichText
                    isRequired: false
                    displayName: Post Body
                    helpText: Add the body of your post here
                - type: object
                  x-fern-type-name: Option Field
                  title: Option Field
                  required:
                    - type
                    - displayName
                    - metadata
                  properties:
                    id:
                      type: string
                      format: objectid
                      description: Unique identifier for a Field
                      readOnly: true
                    isEditable:
                      type: boolean
                      description: Define whether the field is editable
                      readOnly: true
                    isRequired:
                      type: boolean
