  /collections/{collection_id}/items/bulk:
    post:
      x-fern-sdk-group-name:
        - collections
        - items
      x-fern-sdk-method-name: create-items
      security:
        - OAuth2:
            - cms:write
      operationId: create-items
      summary: Webflow Create Collection Items
      description: "Create an item or multiple items in a CMS Collection across multiple corresponding locales.\n\n<Note>\n  - This endpoint can create up to 100 items in a request.\n  - If the `cmsLocaleIds` parameter is not included in the request, an item will only be created in the primary locale.\n</Note>\n\nRequired scope | `CMS:write`\n"
      tags:
        - Collections
        - Items
        - Sites
      parameters:
        - name: collection_id
          in: path
          description: Unique identifier for a Collection
          example: 580e63fc8c9a982ac9b8b745
          required: true
          schema:
            type: string
            format: objectid
        - name: skipInvalidFiles
          in: query
          allowEmptyValue: true
          description: When true, invalid files are skipped and processing continues. When false, the entire request fails if any file is invalid.
          schema:
            type: boolean
            default: true
          example: true
          required: false
      requestBody:
        content:
          application/json:
            schema:
              description: 'A Collection Item represents a single entry in your collection. Each item includes:


                - **System metadata** - Automatically managed fields like IDs and timestamp <br/>

                - **Status flags** - Controls for managing content state: `isDraft`, `isArchived `<br/>

                - **Content fields** - Stored in `fieldData`. Each item needs a `name` and `slug`, and may include additional fields matching your collection''s schema definition.

                '
              required:
                - fieldData
              properties:
                cmsLocaleIds:
                  type: array
                  description: Array of identifiers for the locales where the item will be created
                  items:
                    type: string
                    description: CMS Locale ID
                  example:
                    - 653ad57de882f528b32e810e
                    - 6514390aea353fc691d69827
                    - 65143930ea353fc691d69cd8
                lastPublished:
                  type: string
                  format: date-string
                  readOnly: true
                  example: '2023-03-17T18:47:35.560Z'
                  description: The date and time when the item was last published.
                lastUpdated:
                  type: string
                  format: date-string
                  readOnly: true
                  example: '2023-03-17T18:47:35.560Z'
                  description: The date and time when the item was last updated.
                createdOn:
                  type: string
                  format: date-string
                  readOnly: true
                  example: '2023-03-17T18:47:35.560Z'
                  description: The date and time when the item was created.
                isArchived:
                  type: boolean
                  default: false
                  description: Indicates whether the item is archived.
                isDraft:
                  type: boolean
                  default: true
                  description: Indicates whether the item is in draft state.
                fieldData:
                  oneOf:
                    - type: object
                      x-fern-type-name: Single CMS Item
                      title: Single CMS Item
                      additionalProperties: true
                      properties:
                        name:
                          type: string
                          description: The name of the item.
                        slug:
                          type: string
                          description: 'URL slug for the item in your site.

                            Note: Updating the item slug will break all links referencing the old slug.'
                      required:
                        - name
                        - slug
                    - type: array
                      x-fern-type-name: Multiple CMS Items
                      title: Multiple CMS Items
                      description: A list of CMS items to create
                      items:
                        type: object
                        description: A single CMS item to create
                        additionalProperties: true
                        properties:
                          name:
                            type: string
                            description: The name of the item.
                          slug:
                            type: string
                            description: 'URL slug for the item in your site.

                              Note: Updating the item slug will break all links referencing the old slug.'
                        required:
                          - name
                          - slug
              examples:
                SingleItemMultipleLocales:
                  summary: Create a single item across multiple locales
                  value:
                    cmsLocaleIds:
                      - 66f6e966c9e1dc700a857ca3
                      - 66f6e966c9e1dc700a857ca4
                      - 66f6e966c9e1dc700a857ca5
                    isArchived: false
                    isDraft: false
                    fieldData:
                      name: Don’t Panic
                      slug: dont-panic
                MultipleItemsMultipleLocales:
                  summary: Create multiple items across multipel locales
                  value:
                    cmsLocaleIds:
                      - 66f6e966c9e1dc700a857ca3
                      - 66f6e966c9e1dc700a857ca4
                    isArchived: false
                    isDraft: false
                    fieldData:
                      - name: Don’t Panic
                        slug: dont-panic
                      - name: So Long and Thanks for All the Fish
                        slug: so-long-and-thanks
            examples:
              SingleItemMultipleLocales:
                summary: Create a single item across multiple locales
                value:
                  cmsLocaleIds:
                    - 66f6e966c9e1dc700a857ca3
                    - 66f6e966c9e1dc700a857ca4
                    - 66f6e966c9e1dc700a857ca5
                  isArchived: false
                  isDraft: false
                  fieldData:
                    name: Don’t Panic
                    slug: dont-panic
              MultipleItemsMultipleLocales:
                summary: Create multiple items across multiple locales
                value:
                  cmsLocaleIds:
                    - 66f6e966c9e1dc700a857ca3
                    - 66f6e966c9e1dc700a857ca4
                  isArchived: false
                  isDraft: false
                  fieldData:
                    - name: Don’t Panic
                      slug: dont-panic
                    - name: So Long and Thanks for All the Fish
                      slug: so-long-and-thanks
      responses:
        '202':
          description: Request was successful
          content:
            application/json:
              schema:
                required:
                  - id
                  - cmsLocaleIds
                  - fieldData
                  - lastPublished
                  - lastUpdated
                  - createdOn
                  - isArchived
                  - isDraft
                description: 'The fields that define the schema for a given Item are based on the Collection that Item belongs to. Beyond the user defined fields, there are a handful of additional fields that are automatically created for all items

                  '
                properties:
                  id:
                    type: string
                    example: 580e64008c9a982ac9b8b754
                    description: Unique identifier for the Item
                  cmsLocaleIds:
                    type: array
                    description: Array of identifiers for the locales where the item will be created
                    items:
                      type: string
                      description: CMS Locale ID
                    example:
                      - 653ad57de882f528b32e810e
                      - 6514390aea353fc691d69827
                      - 65143930ea353fc691d69cd8
                  lastPublished:
                    type: string
                    format: date-string
                    nullable: true
                    readOnly: true
                    example: '2023-03-17T18:47:35.560Z'
                    description: The date the item was last published
                  lastUpdated:
                    type: string
                    format: date-string
                    readOnly: true
                    example: '2023-03-17T18:47:35.560Z'
                    description: The date the item was last updated
                  createdOn:
                    type: string
