  /collections/{collection_id}/items/{item_id}/live:
    get:
      x-fern-sdk-group-name:
        - collections
        - items
      x-fern-sdk-method-name: get-item-live
      servers:
        - url: https://api.webflow.com/v2
          x-fern-server-name: Data API
        - url: https://api-cdn.webflow.com/v2
          x-fern-server-name: Content Delivery API
      security:
        - OAuth2:
            - cms:read
      operationId: get-item-live
      summary: Webflow Get Live Collection Item
      description: "Get details of a selected Collection live Item.\n\n<Tip title=\"Serve data with the Content Delivery API\">\n  Serving data to applications in real-time? Use the Content Delivery API at `api-cdn.webflow.com` for better performance. The CDN-backed endpoint is optimized for high-volume reads, while the Data API is designed for writes and management operations.\n</Tip>\n\nRequired scope | `CMS:read`\n"
      tags:
        - Collections
        - Items
        - Sites
      parameters:
        - name: collection_id
          in: path
          description: Unique identifier for a Collection
          example: 580e63fc8c9a982ac9b8b745
          required: true
          schema:
            type: string
            format: objectid
        - name: item_id
          in: path
          description: Unique identifier for an Item
          example: 580e64008c9a982ac9b8b754
          required: true
          schema:
            type: string
            format: objectid
        - name: cmsLocaleId
          in: query
          allowEmptyValue: true
          description: Unique identifier for a CMS Locale. This UID is different from the Site locale identifier and is listed as `cmsLocaleId` in the Sites response. To query multiple locales, input a comma separated string.
          schema:
            type: string
      responses:
        '200':
          description: Request was successful
          content:
            application/json:
              schema:
                title: Collection Item
                description: 'A Collection Item represents a single entry in your collection. Each item includes:


                  - **System metadata** - Automatically managed fields like IDs and timestamp <br/>

                  - **Status flags** - Controls for managing content state: `isDraft`, `isArchived `<br/>

                  - **Content fields** - Stored in `fieldData`. Each item needs a `name` and `slug`, and may include additional fields matching your collection''s schema definition.

                  '
                required:
                  - id
                  - fieldData
                  - lastPublished
                  - lastUpdated
                  - createdOn
                properties:
                  id:
                    type: string
                    readOnly: true
                    example: 580e64008c9a982ac9b8b754
                    description: Unique identifier for the Item
                  cmsLocaleId:
                    type: string
                    example: 653ad57de882f528b32e810e
                    description: Identifier for the locale of the CMS item
                  lastPublished:
                    type: string
                    format: date-string
                    readOnly: true
                    example: '2023-03-17T18:47:35.560Z'
                    description: The date the item was last published
                  lastUpdated:
                    type: string
                    format: date-string
                    readOnly: true
                    example: '2023-03-17T18:47:35.560Z'
                    description: The date the item was last updated
                  createdOn:
                    type: string
                    format: date-string
                    readOnly: true
                    example: '2023-03-17T18:47:35.560Z'
                    description: The date the item was created
                  isArchived:
                    type: boolean
                    default: false
                    description: Boolean determining if the Item is set to archived
                  isDraft:
                    type: boolean
                    default: false
                    description: Boolean determining if the Item is set to draft
                  fieldData:
                    type: object
                    required:
                      - name
                      - slug
                    properties:
                      name:
                        type: string
                        description: Name of the Item
                      slug:
                        type: string
                        description: 'URL structure of the Item in your site. Note: Updates to an item slug will break all links referencing the old slug.'
                    additionalProperties: true
                    example:
                      date: '2022-11-18T00:00:00.000Z'
                      featured: false
                      name: My new item
                      slug: my-new-item
                      color: '#db4b68'
                example:
                  id: 42b720ef280c7a7a3be8cabe
                  cmsLocaleId: 653ad57de882f528b32e810e
                  lastPublished: '2022-11-29T16:22:43.159Z'
                  lastUpdated: '2022-11-17T17:19:43.282Z'
                  createdOn: '2022-11-17T17:11:57.148Z'
                  isArchived: false
                  isDraft: false
                  fieldData:
                    name: The Hitchhiker's Guide to the Galaxy
                    slug: hitchhikers-guide-to-the-galaxy
                    plain-text: Don't Panic.
                    rich-text: <h3>A Guide to Interstellar Travel</h3><p>A towel is about the most massively useful thing an interstellar hitchhiker can have. <strong>Don't forget yours!</strong></p>
                    main-image:
                      fileId: 62b720ef280c7a7a3be8cabe
