    patch:
      x-fern-sdk-group-name:
        - collections
        - items
      x-fern-sdk-method-name: update-items-live
      security:
        - OAuth2:
            - cms:write
      operationId: update-items-live
      summary: Webflow Update Live Collection Items
      description: 'Update a single published item or multiple published items (up to 100) in a Collection


        <Tip title="Localization Tip">Items will only be updated in the primary locale, unless a `cmsLocaleId` is included in the request.</Tip>


        Required scope | `CMS:write`

        '
      tags:
        - Collections
        - Items
        - Sites
      parameters:
        - name: collection_id
          in: path
          description: Unique identifier for a Collection
          example: 580e63fc8c9a982ac9b8b745
          required: true
          schema:
            type: string
            format: objectid
        - name: skipInvalidFiles
          in: query
          allowEmptyValue: true
          description: When true, invalid files are skipped and processing continues. When false, the entire request fails if any file is invalid.
          schema:
            type: boolean
            default: true
          example: true
          required: false
      requestBody:
        description: Details of the live items to update
        content:
          application/json:
            schema:
              properties:
                items:
                  type: array
                  items:
                    description: 'The fields that define the schema for a given Item are based on the Collection that Item belongs to. Beyond the user defined fields, there are a handful of additional fields that are automatically created for all items

                      '
                    required:
                      - id
                    properties:
                      id:
                        type: string
                        example: 580e64008c9a982ac9b8b754
                        description: Unique identifier for the Item
                      cmsLocaleId:
                        type: string
                        example: 653ad57de882f528b32e810e
                        description: Identifier for the locale of the CMS item
                      lastPublished:
                        type: string
                        format: date-string
                        readOnly: true
                        example: '2023-03-17T18:47:35.560Z'
                        description: The date the item was last published
                      lastUpdated:
                        type: string
                        format: date-string
                        readOnly: true
                        example: '2023-03-17T18:47:35.560Z'
                        description: The date the item was last updated
                      createdOn:
                        type: string
                        format: date-string
                        readOnly: true
                        example: '2023-03-17T18:47:35.560Z'
                        description: The date the item was created
                      isArchived:
                        type: boolean
                        description: Boolean determining if the Item is set to archived
                      isDraft:
                        type: boolean
                        description: Boolean determining if the Item is set to draft
                      fieldData:
                        type: object
                        properties:
                          name:
                            type: string
                            description: Name of the Item
                          slug:
                            type: string
                            description: 'URL structure of the Item in your site. Note: Updates to an item slug will break all links referencing the old slug.'
                        additionalProperties: true
                        example:
                          date: '2022-11-18T00:00:00.000Z'
                          featured: false
                          name: My new item
                          slug: my-new-item
                          color: '#db4b68'
                    example:
                      id: 42b720ef280c7a7a3be8cabe
                      cmsLocaleId: 653ad57de882f528b32e810e
                      lastPublished: '2022-11-29T16:22:43.159Z'
