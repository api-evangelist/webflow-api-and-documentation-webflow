    delete:
      x-fern-sdk-group-name:
        - sites
        - robots-txt
      x-fern-sdk-method-name: delete
      security:
        - OAuth2:
            - site_config:write
      operationId: delete-robots-txt
      summary: Webflow Delete robots.txt
      description: 'Remove specific rules for a user-agent in your `robots.txt` file. To delete all rules for a user-agent, provide an empty rule set. This will remove the user-agent''s entry entirely, leaving it subject to your site''s default crawling behavior.


        **Note:** Deleting a user-agent with no rules will make the user-agent''s access unrestricted unless other directives apply.


        <Warning title="Enterprise Only">This endpoint requires an Enterprise workspace.</Warning>


        Required scope: `site_config:write`

        '
      tags:
        - Sites
      parameters:
        - name: site_id
          in: path
          description: Unique identifier for a Site
          example: 580e63e98c9a982ac9b8b741
          required: true
          schema:
            type: string
            format: objectid
            default:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: The robots.txt file for a given site
              properties:
                rules:
                  type: array
                  description: List of rules for user agents.
                  items:
                    type: object
                    properties:
                      userAgent:
                        type: string
                        description: The user agent the rules apply to.
                        example: googlebot
                      allows:
                        type: array
                        description: List of paths allowed for this user agent.
                        items:
                          type: string
                          description: Allowed path for the user agent.
                          example: /public
                      disallows:
                        type: array
                        description: List of paths disallowed for this user agent.
                        items:
                          type: string
                          description: Disallowed path for the user agent.
                          example: /checkout
                    required:
                      - userAgent
                sitemap:
                  type: string
                  description: URL to the sitemap.
                  example: https://heartofgold.ship/sitemap.xml
              example:
                rules:
                  - userAgent: googlebot
                    allows: []
                    disallows:
                      - /vogon-poetry
                      - /total-perspective-vortex
                sitemap: https://heartofgold.ship/sitemap.xml
            example:
              rules:
                - userAgent: '*'
                  allows: []
                  disallows:
                    - /bubbles
      responses:
        '200':
          description: Request was successful
          content:
            application/json:
              schema:
                type: object
