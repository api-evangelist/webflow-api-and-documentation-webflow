vocabulary: "1.0.0"

info:
  provider: "Webflow API and Documentation"
  description: >-
    Unified vocabulary for the Webflow Data API, mapping CMS resources, site
    management actions, ecommerce entities, and content workflow capabilities.
  created: "2026-05-03"
  modified: "2026-05-03"

operational:
  apis:
    - name: Webflow Data API
      namespace: webflow-data
      version: "v2"
      baseUrl: https://api.webflow.com/v2
      status: active

  resources:
    - name: sites
      description: Webflow sites within a workspace
      apis: [webflow-data]
      actions: [list, get, create, update, delete, publish]
    - name: collections
      description: CMS content type definitions within a site
      apis: [webflow-data]
      actions: [list, get, create, delete]
    - name: items
      description: Individual CMS content entries within a collection
      apis: [webflow-data]
      actions: [list, get, create, update, delete, publish, unpublish]
    - name: pages
      description: Static and dynamic pages within a Webflow site
      apis: [webflow-data]
      actions: [list, get, update]
    - name: webhooks
      description: HTTP event callbacks for Webflow site events
      apis: [webflow-data]
      actions: [list, get, create, delete]
    - name: assets
      description: Images and file uploads for Webflow sites
      apis: [webflow-data]
      actions: [list, create, update, delete]
    - name: forms
      description: Form definitions and submission data
      apis: [webflow-data]
      actions: [list, get-submissions]
    - name: products
      description: Ecommerce product catalog items
      apis: [webflow-data]
      actions: [list, get, create, update, delete]
    - name: orders
      description: Ecommerce order management
      apis: [webflow-data]
      actions: [list, get, update, fulfill, refund]
    - name: inventory
      description: Ecommerce product inventory management
      apis: [webflow-data]
      actions: [list, update]

  actions:
    - name: list
      description: Retrieve a collection of resources
      pattern: read
      methods: [GET]
    - name: get
      description: Retrieve a single resource by ID
      pattern: read
      methods: [GET]
    - name: create
      description: Create a new resource
      pattern: write
      methods: [POST]
    - name: update
      description: Update an existing resource
      pattern: write
      methods: [PATCH, PUT]
    - name: delete
      description: Remove a resource
      pattern: destructive
      methods: [DELETE]
    - name: publish
      description: Make a site or item live to visitors
      pattern: write
      methods: [POST]
    - name: unpublish
      description: Remove a published item from public view
      pattern: write
      methods: [POST, DELETE]
    - name: fulfill
      description: Mark an ecommerce order as fulfilled
      pattern: write
      methods: [POST]
    - name: refund
      description: Process a refund for an ecommerce order
      pattern: write
      methods: [POST]

  schemas:
    cms:
      - name: Site
        properties: [id, displayName, shortName, lastPublished, previewUrl, timeZone, createdOn]
      - name: Collection
        properties: [id, displayName, singularName, slug, fields, createdOn, lastUpdated]
      - name: CollectionItem
        properties: [id, cmsLocaleId, lastPublished, lastUpdated, createdOn, isArchived, isDraft, fieldData]
    ecommerce:
      - name: Product
        properties: [id, cmsLocaleId, fieldData, skus]
      - name: Order
        properties: [orderId, status, acceptedOn, customerInfo, purchasedItemsCount, statusPayment]
    webhooks:
      - name: Webhook
        properties: [id, triggerType, url, workspaceId, siteId, lastTriggered, createdOn]
    assets:
      - name: Asset
        properties: [id, displayName, contentType, size, url, createdOn]

  parameters:
    pagination:
      - name: limit
        description: Maximum number of items to return
      - name: offset
        description: Number of items to skip for pagination
    identifiers:
      - name: site_id
        description: Unique identifier for a Webflow site
      - name: collection_id
        description: Unique identifier for a CMS collection
      - name: item_id
        description: Unique identifier for a CMS item
      - name: workspace_id
        description: Unique identifier for a Webflow workspace
    filters:
      - name: isDraft
        description: Filter items by draft/published status
      - name: isArchived
        description: Filter to include or exclude archived items

  enums:
    webhookTriggers:
      - form_submission
      - site_publish
      - page_created
      - page_metadata_updated
      - page_deleted
      - ecomm_new_order
      - ecomm_order_changed
      - ecomm_inventory_changed
      - collection_item_created
      - collection_item_changed
      - collection_item_deleted
      - collection_item_unpublished
    orderStatuses:
      - pending
      - unfulfilled
      - fulfilled
      - disputed
      - disputed_won
      - refunded
    paymentStatuses:
      - pending
      - paid
      - manual

  authentication:
    - type: apikey
      description: API key (personal access token or site/workspace token)
      headerName: Authorization
      format: "Bearer {api_token}"
    - type: oauth2
      description: OAuth 2.0 authorization code flow for apps
      authorizationUrl: https://webflow.com/oauth/authorize
      tokenUrl: https://api.webflow.com/oauth/access_token

capability:
  workflows:
    - name: CMS Management
      file: capabilities/cms-management.yaml
      description: Site publishing, CMS collection and item management, webhook automation
      apis: [webflow-data]
      toolCount: 10
      personas: [content-manager, developer, marketing-automation]
      domains: [CMS, Publishing, Webhooks]

  personas:
    - id: content-manager
      name: Content Manager
      description: Manages CMS collections, creates and publishes content items
      workflows: [CMS Management]
    - id: developer
      name: Developer
      description: Builds Webflow integrations, manages webhooks, automates publishing
      workflows: [CMS Management]
    - id: marketing-automation
      name: Marketing Automation Engineer
      description: Automates content creation and publishing for marketing campaigns
      workflows: [CMS Management]
    - id: ecommerce-manager
      name: Ecommerce Manager
      description: Manages products, orders, and inventory through the API
      workflows: []

  domains:
    - name: CMS
      description: Content management system collections and items
    - name: Publishing
      description: Site and content publishing workflows
    - name: Ecommerce
      description: Product catalog, orders, and inventory management
    - name: Webhooks
      description: Event-driven automation via HTTP callbacks
    - name: Sites
      description: Webflow site configuration and management
    - name: Assets
      description: Digital asset management for site media

  namespaces:
    - namespace: webflow-data
      type: consumed
      baseUri: https://api.webflow.com/v2
    - namespace: webflow-cms-api
      type: rest-exposed
      port: 8080
    - namespace: webflow-cms-mcp
      type: mcp-exposed
      port: 9080

  binds:
    - WEBFLOW_API_KEY: "Webflow API key (personal access token or site-specific token) from app.webflow.com/account/integrations"

crossReference:
  - resource: sites
    operations: [list-sites, get-site, publish-site]
    workflows: [CMS Management]
    personas: [content-manager, developer, marketing-automation]
  - resource: collections
    operations: [list-collections, get-collection]
    workflows: [CMS Management]
    personas: [content-manager, developer]
  - resource: items
    operations: [list-items, create-item, update-item, delete-item, publish-item]
    workflows: [CMS Management]
    personas: [content-manager, developer, marketing-automation]
  - resource: webhooks
    operations: [list-webhooks, create-webhook]
    workflows: [CMS Management]
    personas: [developer]
